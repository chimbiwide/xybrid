version: "0.1.0"

classes:

  # -------------------------------------------------------------------
  # 1. Xybrid (Entry Point)
  # -------------------------------------------------------------------
  Xybrid:
    type: singleton
    section: "1. Xybrid (Entry Point)"
    methods:
      init:
        async: true
        status: { dart: implemented, kotlin: implemented, swift: planned, csharp: implemented }
      setApiKey:
        params: [{ name: apiKey, type: String }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      model:
        params:
          - { name: modelId, type: "String?" }
          - { name: platform, type: "String?" }
          - { name: bundlePath, type: "String?" }
          - { name: modelDir, type: "String?" }
        return: XybridModelLoader
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      pipeline:
        params:
          - { name: yaml, type: "String?" }
          - { name: filePath, type: "String?" }
        return: XybridPipelineRef
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      isModelCached:
        params: [{ name: modelId, type: String }]
        return: bool
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }

  # -------------------------------------------------------------------
  # 2. XybridModelLoader
  # -------------------------------------------------------------------
  XybridModelLoader:
    type: class
    section: "2. XybridModelLoader"
    methods:
      fromRegistry:
        static: true
        params: [{ name: modelId, type: String }]
        return: XybridModelLoader
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      fromBundle:
        static: true
        params: [{ name: path, type: String }]
        return: XybridModelLoader
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      fromDirectory:
        static: true
        params: [{ name: path, type: String }]
        return: XybridModelLoader
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      fromModelFile:
        static: true
        params: [{ name: filePath, type: String }]
        return: XybridModelLoader
        notes: "Loads a raw GGUF file directly. Auto-generates model_metadata.json from GGUF binary header if not present."
        status: { dart: planned, kotlin: planned, swift: planned, csharp: implemented }
      fromHuggingFace:
        static: true
        params: [{ name: repo, type: String }]
        return: XybridModelLoader
        notes: "Requires huggingface feature flag. Downloads and caches model files from HuggingFace Hub."
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      load:
        async: true
        return: XybridModel
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      loadWithProgress:
        return: "Stream<LoadEvent>"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }

