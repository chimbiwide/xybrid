      load:
        async: true
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      run:
        async: true
        params: [{ name: envelope, type: Envelope }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
    properties:
      name:
        type: "String?"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
